<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Karyawan</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Container Utama -->
    <div class="container mt-5">
        
        <!-- BAGIAN LOGIN (Untuk Skenario Pengujian A/B) -->
        <div id="loginSection" class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h4 class="text-center mb-4">Secure Login</h4>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" value="admin" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" value="rahasia123" required>
                            </div>
                            <button type="submit" id="submitBtn" class="btn btn-primary w-100">Login</button>
                        </form>
                        <div id="message" class="mt-3 text-center" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- BAGIAN DASHBOARD CRUD (Awalnya Sembunyi) -->
        <div id="dashboardSection" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Data Karyawan</h2>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>

            <div class="row">
                <!-- Form Tambah Karyawan -->
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">Tambah Karyawan</h5>
                        </div>
                        <div class="card-body">
                            <form id="employeeForm">
                                <div class="mb-3">
                                    <label class="form-label">Nama</label>
                                    <input type="text" class="form-control" id="empName" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Jabatan</label>
                                    <input type="text" class="form-control" id="empPos" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Gaji (Rp)</label>
                                    <input type="number" class="form-control" id="empSal" required>
                                    <div class="form-text text-muted small">Data gaji akan dienkripsi AES-128-GCM sebelum disimpan ke Database MySQL.</div>
                                </div>
                                <button type="submit" class="btn btn-success w-100">Simpan Data</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Tabel Data Karyawan -->
                <div class="col-md-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-body">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nama</th>
                                        <th>Jabatan</th>
                                        <th>Gaji (Decrypted)</th>
                                        <th>Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="employeeTableBody">
                                    <tr><td colspan="5" class="text-center">Memuat data...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Script Logika -->
    <script>
        // --- LOGIC LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            
            btn.textContent = 'Memproses...';
            btn.disabled = true;
            msg.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                // Endpoint lama tetap digunakan untuk pengujian sniffing laporan
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Jika sukses, sembunyikan login, tampilkan dashboard
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboardSection').style.display = 'block';
                    loadEmployees();
                } else {
                    msg.style.display = 'block';
                    msg.className = 'text-danger';
                    msg.textContent = '❌ ' + (data.message || 'Login gagal');
                }
            } catch (error) {
                msg.style.display = 'block';
                msg.className = 'text-danger';
                msg.textContent = '❌ Terjadi kesalahan jaringan.';
            } finally {
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        });

        function logout() {
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'flex';
        }

        // --- LOGIC CRUD KARYAWAN ---
        async function loadEmployees() {
            const tbody = document.getElementById('employeeTableBody');
            try {
                const response = await fetch('/api/employees');
                const result = await response.json();
                
                if (result.status === 'success') {
                    tbody.innerHTML = '';
                    if (result.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Belum ada data karyawan.</td></tr>';
                        return;
                    }

                    result.data.forEach(emp => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${emp.id}</td>
                            <td>${emp.name}</td>
                            <td>${emp.position}</td>
                            <td class="text-success fw-bold">Rp ${Number(emp.salary).toLocaleString('id-ID')}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteEmployee(${emp.id})">Hapus</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Gagal memuat data dari server.</td></tr>';
            }
        }

        document.getElementById('employeeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Menyimpan...';

            const name = document.getElementById('empName').value;
            const position = document.getElementById('empPos').value;
            const salary = document.getElementById('empSal').value;

            try {
                const response = await fetch('/api/employees', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, position, salary })
                });

                if (response.ok) {
                    e.target.reset();
                    loadEmployees();
                } else {
                    alert("Gagal menambahkan karyawan");
                }
            } catch (err) {
                alert("Kesalahan jaringan");
            } finally {
                btn.disabled = false;
                btn.textContent = 'Simpan Data';
            }
        });

        async function deleteEmployee(id) {
            if(!confirm('Apakah Anda yakin ingin menghapus data ini?')) return;
            try {
                const response = await fetch('/api/employees/' + id, { method: 'DELETE' });
                if (response.ok) {
                    loadEmployees();
                } else {
                    alert('Gagal menghapus data');
                }
            } catch(err) {
                alert('Kesalahan jaringan saat menghapus data');
            }
        }
    </script>
</body>
</html>
