# Nginx config khusus untuk Skenario A (Baseline HTTP tanpa enkripsi)
# Gunakan file ini untuk mengganti nginx.conf saat pengujian Skenario A
# Perintah: copy nginx-http.conf nginx.conf lalu rebuild container

server {
    listen 80;
    server_name localhost;

    # --- Reverse Proxy ke Frontend ---
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Reverse Proxy ke Backend API ---
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
